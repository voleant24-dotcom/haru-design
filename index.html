<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루 설계 - AI 사주 가이드</title>
    <style>
        body { margin: 0; padding: 0; background: #0a0e17; color: white; font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; }
        .hero { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1534841090574-cba2d662b62e?q=80&w=2070&auto=format&fit=crop'); 
                height: 60vh; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .logo { color: #ffbc00; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        h1 { font-size: 32px; margin: 10px 0; }
        .score-circle { width: 150px; height: 150px; border: 5px solid #ffbc00; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; margin: 20px auto; }
        .score-num { font-size: 48px; font-weight: bold; }
        .btn { background: #1a4da1; color: white; padding: 15px 40px; border-radius: 30px; text-decoration: none; font-size: 18px; font-weight: bold; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo">하루 설계</div>
        <h1>오늘 당신의 운명 점수는?</h1>
        <div class="score-circle">
            <span style="font-size: 14px;">종합 점수</span>
            <span class="score-num">85</span>
        </div>
        <p>"오늘 금(金)의 기운이 강하니 투재에 길합니다."</p>
        <a href="#" class="btn">상세 리포트 보러가기</a>
    </div>
    
    <div style="padding: 40px 20px;">
        <h3>오늘의 담당 전문가</h3>
        <div style="display: flex; justify-content: center; gap: 20px;">
            <div>💰<br>투자왕 금</div>
            <div>❤️<br>연애닥터 목</div>
            <div>📜<br>총괄 멘토</div>
        </div>
    </div>
</body>
</html>
