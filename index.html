<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루테크 - 여신의 부름</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Pretendard', sans-serif; }
        
        /* 1. 배경 설정 */
        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('bg001.jpg') no-repeat center center;
            background-size: cover;
        }

        /* 2. 캐릭터 설정 (자동 누끼/필터링 효과 포함) */
        .character {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%; /* 화면 크기에 맞춰 조절 */
            z-index: 2;
            /* 여신님이 공중에 떠 있는 듯한 애니메이션 */
            animation: float 4s ease-in-out infinite;
            /* 흰색 배경을 투명하게 만드는 마법의 한 줄 (mix-blend-mode) */
            /* 만약 누끼를 이미 따셨다면 아래 줄은 지워주세요 */
            mix-blend-mode: multiply; 
        }

        @keyframes float {
            0%, 100% { bottom: 5%; }
            50% { bottom: 7%; }
        }

        /* 3. 말풍선 설정 */
        .dialogue-box {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(0, 0, 0, 0.7); /* 반투명 블랙 */
            border: 2px solid rgba(255, 215, 0, 0.5); /* 은은한 금색 테두리 */
            border-radius: 15px;
            padding: 20px;
            color: white;
            z-index: 3;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .name { color: #ffd700; font-weight: bold; font-size: 1.1em; margin-bottom: 8px; }
        .text { line-height: 1.6; font-size: 0.95em; word-break: keep-all; }
    </style>
</head>
<body>

<div class="scene">
    <img src="c001.png" alt="Goddess" class="character">

    <div class="dialogue-box">
        <div class="name">여신 (Goddess)</div>
        <div class="text">
            "오시느라 고생 많으셨습니다. 이 먼 곳, 시공간의 틈새까지 당신의 발소리가 닿기만을... 저는 아주 오래전부터 기다리고 있었답니다."
        </div>
    </div>
</div>

</body>
</html>
